<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MU BAST - MÁY CHỦ MỚI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #000 url('http://157.10.198.179/web/Background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.6); /* Làm mờ nền một chút để nổi bật nội dung */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            padding: 40px 20px;
            border: 2px solid #d4af37;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5); /* Hiệu ứng hào quang vàng */
        }
        h1 { 
            color: #d4af37; 
            font-size: 3.5rem; 
            margin-bottom: 5px;
            text-shadow: 2px 2px 5px #000;
        }
        .version {
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 30px;
            display: block;
        }
        .btn {
            display: block;
            padding: 18px;
            margin: 15px auto;
            font-size: 1.4rem;
            font-weight: bold;
            text-decoration: none;
            color: #000;
            background: linear-gradient(to bottom, #f9df7b, #d4af37); /* Hiệu ứng màu vàng kim loại */
            border-radius: 50px;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.8);
            filter: brightness(1.1);
        }
        .btn-sub { 
            background: transparent; 
            color: #d4af37; 
            border: 1px solid #d4af37;
            font-size: 1.1rem;
        }
        .btn-sub:hover {
            background: rgba(212, 175, 55, 0.1);
        }
        .footer { margin-top: 30px; font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="overlay">
        <div class="container">
            <h1>BAST MU</h1>
            <span class="version">SEASON 2 No Reset</span>
            
            <a href="LINK_TAI_GAME" class="btn">📥 TẢI GAME NGAY</a>
            <a href="https://zalo.me/g/geqwdl816" class="btn btn-sub">📝 Group Zalo</a>
            <a href="https://www.facebook.com/groups/1260426852933240" class="btn btn-sub">💬 Group Facebook</a>
            
            <div class="footer">
                <p>© MuOnline 2006 - MIỄN PHÍ- CÀY CUỐC</p>
            </div>
        </div>
    </div>
</body>
</html>
