<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BastMU - CHIẾN BINH THỨC TỈNH</title>
    <style>
        /* 1. NỀN VÀ FONT CHỮ */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
           background: #000 url('Background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Lớp phủ làm tối nền để nổi bật chữ */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1;
        }

        /* 2. KHUNG NỘI DUNG CHÍNH */
        .container {
            position: relative;
            z-index: 2;
            max-width: 450px;
            width: 90%;
            padding: 40px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid #444;
            border-top: 3px solid #d4af37; /* Thanh vàng trên cùng */
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: center;
        }

        h1 {
            color: #d4af37;
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        .server-info {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* 3. THÔNG SỐ SERVER (Mới thêm) */
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 15px 0;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        .stat-item b { color: #d4af37; display: block; font-size: 1.2rem; }
        .stat-item span { font-size: 0.7rem; color: #aaa; }

        /* 4. NÚT BẤM CẢI TIẾN */
        .btn {
            display: block;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-download {
            background: linear-gradient(135deg, #d4af37 0%, #aa891e 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }

        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            filter: brightness(1.2);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid #444;
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
            color: #d4af37;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>

            <div class="stat-item"><b>10%</b><span>Rơi Đồ</span></div>
            <div class="stat-item"><b>1Acc / 1Ip</b><span>Ổn Định</span></div>
        </div>

        <div class="footer">
            &copy; 2026 BastMu FREE All
        </div>
    </div>
</body>
