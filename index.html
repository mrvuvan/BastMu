    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* 1. Sử dụng ảnh web.png làm nền */
            background: #000 url('web1.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            overflow: hidden;
        }

        /* Lớp phủ mờ nhẹ để chữ nổi bật hơn (có thể chỉnh 0.2 thành 0 nếu muốn ảnh rõ hoàn toàn) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* 1. Menu điều hướng góc trên bên phải */
        .top-nav {
            position: absolute;
            top: 25px;
            right: 30px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        .nav-item {
            text-decoration: none;
            color: #EEE;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .nav-item:hover {
            background: #d4af37;
            color: #000;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
        }

        /* 2. Phần Text tùy ý ở giữa trên chữ BastVN MuOnline */
        .custom-content {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .custom-text {
            /* Vị trí được căn chỉnh để nằm ngay phía trên logo chính của ảnh */
            margin-bottom: 250px; 
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            /* Màu vàng kim và hiệu ứng phát sáng */
            color: #d4af37;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.8), 2px 2px 4px #000;
            letter-spacing: 2px;
        }
    </style>
</head>
